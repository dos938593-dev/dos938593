{% extends "base.html" %}

{% block title %}Добавить фильм — Прожектор{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <h1>
        <i class="fas fa-plus-circle"></i> Добавить фильм вручную
    </h1>
    
    <div class="admin-panel">
        <form method="POST" class="admin-form">
            <div class="form-group">
                <label><i class="fas fa-film"></i> Название *</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-language"></i> Оригинальное название</label>
                <input type="text" name="original_title" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Год</label>
                <input type="number" name="year" value="2026" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Страна</label>
                <input type="text" name="country" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Режиссёр</label>
                <input type="text" name="director" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-users"></i> Актёры (через запятую)</label>
                <input type="text" name="cast" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Длительность (мин)</label>
                <input type="number" name="duration" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tags"></i> Жанр</label>
                <input type="text" name="genre" class="form-control">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Описание</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-image"></i> URL постера</label>
                <input type="url" name="poster_url" class="form-control" placeholder="https://...">
            </div>
            
            <div class="form-group">
                <label><i class="fab fa-imdb"></i> Рейтинг IMDb</label>
                <input type="number" step="0.1" name="rating_imdb" class="form-control" placeholder="8.4">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-star"></i> Рейтинг Кинопоиск</label>
                <input type="number" step="0.1" name="rating_kinopoisk" class="form-control" placeholder="7.9">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-child"></i> Возрастное ограничение</label>
                <select name="age_restriction" class="form-control">
                    <option value="0+">0+</option>
                    <option value="6+">6+</option>
                    <option value="12+" selected>12+</option>
                    <option value="16+">16+</option>
                    <option value="18+">18+</option>
                </select>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_premiere" id="is_premiere">
                <label for="is_premiere"><i class="fas fa-star"></i> Премьера</label>
            </div>
            
            <div class="form-group" style="grid-column: 1/-1; display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Добавить фильм
                </button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn">
                    <i class="fas fa-times"></i> Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
