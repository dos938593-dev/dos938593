{% extends "base.html" %}

{% block title %}Предложить фильм — Прожектор{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <h1>
        <i class="fas fa-plus-circle"></i> Предложить фильм в афишу
    </h1>
    
    <div class="admin-panel">
        <form method="POST" class="admin-form">
            <div class="form-group">
                <label><i class="fas fa-film"></i> Название фильма *</label>
                <input type="text" name="title" class="form-control" placeholder="Например: Дюна: Пророчество" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-language"></i> Оригинальное название</label>
                <input type="text" name="original_title" class="form-control" placeholder="Dune: Prophecy">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Год выпуска</label>
                <input type="number" name="year" class="form-control" placeholder="2026" value="2026">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Страна</label>
                <input type="text" name="country" class="form-control" placeholder="США, Россия">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Режиссёр</label>
                <input type="text" name="director" class="form-control" placeholder="Дени Вильнёв">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-users"></i> Актёры (через запятую)</label>
                <input type="text" name="cast" class="form-control" placeholder="Тимоти Шаламе, Зендея">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-clock"></i> Длительность (минут)</label>
                <input type="number" name="duration" class="form-control" placeholder="165">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-tags"></i> Жанр</label>
                <input type="text" name="genre" class="form-control" placeholder="фантастика, боевик, драма">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-align-left"></i> Описание</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Краткое описание фильма..."></textarea>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-image"></i> Ссылка на постер</label>
                <input type="url" name="poster_url" class="form-control" placeholder="https://... .jpg">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-child"></i> Возрастное ограничение</label>
                <select name="age_restriction" class="form-control">
                    <option value="0+">0+</option>
                    <option value="6+">6+</option>
                    <option value="12+" selected>12+</option>
                    <option value="16+">16+</option>
                    <option value="18+">18+</option>
                </select>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" name="is_premiere" id="is_premiere">
                <label for="is_premiere"><i class="fas fa-star"></i> Это премьера?</label>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-user"></i> Ваше имя (необязательно)</label>
                <input type="text" name="user_name" class="form-control" placeholder="Как к вам обращаться?">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Ваш email (необязательно)</label>
                <input type="email" name="user_email" class="form-control" placeholder="Для связи">
            </div>
            
            <div class="form-group" style="grid-column: 1/-1;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Отправить предложение
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
